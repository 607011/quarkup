name: Build VS Code extension

on:
  push:
    branches: [main]
    paths:
      - "vscode-extension/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/vscode-extension.yml"
  pull_request:
    paths:
      - "vscode-extension/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/vscode-extension.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build output
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli matching Cargo.lock
        run: |
          set -euo pipefail
          version=$(grep -A2 '^name = "wasm-bindgen"$' Cargo.lock | grep '^version' | head -1 | cut -d '"' -f2)
          echo "wasm-bindgen version: $version"
          curl -sSL "https://github.com/rustwasm/wasm-bindgen/releases/download/${version}/wasm-bindgen-${version}-x86_64-unknown-linux-musl.tar.gz" | tar xz
          sudo mv "wasm-bindgen-${version}-x86_64-unknown-linux-musl/wasm-bindgen" /usr/local/bin/
          wasm-bindgen --version

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install extension dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Build wasm/KaTeX assets, compile, and package the .vsix
        working-directory: vscode-extension
        run: npm run package

      - name: Upload .vsix as a build artifact
        uses: actions/upload-artifact@v7
        with:
          name: quarkup-vscode-extension
          path: vscode-extension/*.vsix
          if-no-files-found: error

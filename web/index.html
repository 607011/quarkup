<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarkup Playground</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%E2%9A%9B</text></svg>">
<script defer src="vendor/katex/katex.min.js"></script>
<style>
    :root {
        color-scheme: light dark;
        --bg: #fafbfc;
        --panel-bg: #ffffff;
        --border: #e1e4e8;
        --text: #24292e;
        --text-dim: #57606a;
        --accent: #2f5971;
        --accent-hover: #244757;
        --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --error: #cf222e;
        --ok: #1a7f37;
    }
    @media (prefers-color-scheme: dark) {
        :root {
            --bg: #0d1117;
            --panel-bg: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --accent: #4f9fc4;
            --accent-hover: #6db4d6;
            --error: #ff7b72;
            --ok: #3fb950;
        }
    }

    * { box-sizing: border-box; }

    html, body {
        height: 100%;
        margin: 0;
    }

    body {
        font-family: var(--sans);
        color: var(--text);
        background: var(--bg);
        display: flex;
        flex-direction: column;
    }

    header {
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
        padding: 0.85rem 1.25rem;
        border-bottom: 1px solid var(--border);
        background: var(--panel-bg);
        flex-wrap: wrap;
    }

    header h1 {
        font-size: 1.05rem;
        margin: 0;
        font-weight: 600;
    }

    header p {
        margin: 0;
        color: var(--text-dim);
        font-size: 0.85rem;
    }

    #status {
        margin-left: auto;
        font-size: 0.8rem;
        color: var(--text-dim);
        white-space: nowrap;
    }
    #status.error { color: var(--error); }
    #status.ok { color: var(--ok); }

    toolbar, .toolbar {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.6rem 1.25rem;
        border-bottom: 1px solid var(--border);
        background: var(--panel-bg);
        flex-wrap: wrap;
        font-size: 0.85rem;
    }

    .toolbar label {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        color: var(--text-dim);
        cursor: pointer;
        white-space: nowrap;
    }

    .toolbar input[type="checkbox"] { accent-color: var(--accent); }

    button {
        font: inherit;
        font-size: 0.8rem;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 6px;
        padding: 0.4rem 0.8rem;
        cursor: pointer;
    }
    button:hover { background: var(--accent-hover); }
    button.secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
    }
    button.secondary:hover { background: var(--border); }

    details {
        font-size: 0.85rem;
    }
    details summary {
        cursor: pointer;
        color: var(--text-dim);
    }

    main {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: 0;
    }

    @media (max-width: 800px) {
        main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
    }

    .pane {
        display: flex;
        flex-direction: column;
        min-height: 0;
        min-width: 0;
    }
    .pane + .pane { border-left: 1px solid var(--border); }
    @media (max-width: 800px) {
        .pane + .pane { border-left: none; border-top: 1px solid var(--border); }
    }

    .pane-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-dim);
        padding: 0.4rem 0.9rem;
        background: var(--panel-bg);
        border-bottom: 1px solid var(--border);
    }

    #source {
        flex: 1;
        border: none;
        resize: none;
        padding: 1rem 1.25rem;
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1.6;
        background: var(--bg);
        color: var(--text);
        outline: none;
    }

    #preview {
        flex: 1;
        border: none;
        background: white;
    }

    .options-panel {
        padding: 0.75rem 1.25rem 1rem;
        border-bottom: 1px solid var(--border);
        background: var(--panel-bg);
        font-size: 0.85rem;
        display: none;
        flex-direction: column;
        gap: 0.5rem;
    }
    .options-panel.open { display: flex; }
    .options-panel label {
        display: block;
        color: var(--text-dim);
        margin-bottom: 0.25rem;
    }
    .options-panel textarea {
        width: 100%;
        font-family: var(--mono);
        font-size: 12px;
        padding: 0.5rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--bg);
        color: var(--text);
        resize: vertical;
    }
    #defines { height: 3.5rem; }
    #template { height: 8rem; }
</style>
</head>
<body>

<header>
    <h1>⚛ Quarkup Playground</h1>
    <p>Compiles Quarkup markup to HTML entirely in your browser via WebAssembly — nothing is sent to a server.</p>
    <span id="status">Loading compiler…</span>
</header>

<div class="toolbar">
    <button id="load-example" class="secondary">Load example</button>
    <button id="download" class="secondary" disabled>Download HTML</button>
    <label><input type="checkbox" id="monolithic"> Embed images (monolithic)</label>
    <details id="options-toggle">
        <summary>Defines &amp; custom template</summary>
    </details>
</div>

<div class="options-panel" id="options-panel">
    <div>
        <label for="defines">Defines (one <code>KEY=VALUE</code> per line, used by <code>.b</code> conditionals)</label>
        <textarea id="defines" spellcheck="false" placeholder="target=web&#10;draft=true"></textarea>
    </div>
    <div>
        <label><input type="checkbox" id="use-template"> Use custom HTML template (same <code>{{title}}</code> / <code>{{content}}</code> placeholders as <code>--template</code>)</label>
        <textarea id="template" spellcheck="false" disabled placeholder="<!DOCTYPE html>&#10;<html>...&#10;{{content}}&#10;..."></textarea>
    </div>
</div>

<main>
    <div class="pane">
        <div class="pane-label">Quarkup source</div>
        <textarea id="source" spellcheck="false" placeholder=".u Hello, Quarkup!"></textarea>
    </div>
    <div class="pane">
        <div class="pane-label">Rendered preview</div>
        <iframe id="preview" title="Rendered HTML preview" sandbox="allow-same-origin"></iframe>
    </div>
</main>

<script type="module">
    import init, { compile } from './pkg/quarkup.js';

    const sourceEl = document.getElementById('source');
    const previewEl = document.getElementById('preview');
    const statusEl = document.getElementById('status');
    const monolithicEl = document.getElementById('monolithic');
    const definesEl = document.getElementById('defines');
    const useTemplateEl = document.getElementById('use-template');
    const templateEl = document.getElementById('template');
    const downloadBtn = document.getElementById('download');
    const loadExampleBtn = document.getElementById('load-example');
    const optionsPanel = document.getElementById('options-panel');
    const optionsToggle = document.getElementById('options-toggle');

    const EXAMPLE = `.t title The Subatomic Manifesto
.t author Oliver
.t lang en
.t description An in-depth physical treatise about Quarkup documents and their lattice structures.
.t keywords physics, quarks, lattice, compiler, rust
.t copyright ©️ 2026 Oliver. All rights reserved.

.u The World of Quarks
Welcome to document physics. Quarkup is so tiny, it is almost invisible.

.uu Mathematical and Chemical States
In Quarkup, the gravity of the text is incredibly easy to control.
A well-known molecule is H.d 2..O, while in mathematics we love to calculate with a.u 2.. + b.u 2.. = c.u 2...

We can also easily .c emphasize text energetically.. or declare it as .s inline_code...

Furthermore, we can harness the power of inline math. The energy is defined by .s math E = mc^2.. or the wave function .s math \\psi(x, t) = A e^{i(kx - \\omega t)}.. drifting directly within the flow of our text.

And here is a dedicated block-level math field for complex field equations to expand freely in space:

.s math
\\int_{-\\infty}^{\\infty} e^{-x^2} dx = \\sqrt{\\pi}
..

.uu Lists and Alignments (Leptons)
Here are the three most fundamental pillars of Quarkup:

.n Minimalism through point-like singularities
.n Full performance powered by our Rust parser
.nn Zero heap allocations during lexing
.nn Guaranteed zero-copy operations
.n Supreme aesthetics

And the installation process is wonderfully simple:

.e Clone the repository
.e Create your test.qu file
.e Feed the compiler via stdin

.uu Visualization (Conservation of Energy)
We can load our high-resolution terrace image without any cluttered brackets:

.g assets/terrace.jpg A magnificent view of the garden at sunset

.uu A Real Code Listing
Here is a multi-line block that runs completely isolated from the rest of our parser, beautifully highlighted by the compiler:

.s rust
fn main() {
    // English comment: Inside this block, absolutely nothing is falsely parsed!
    let water = "H.d 2..O";
    println!("Formula: {}", water);
}
..

.uu Tables a.k.a. Lattices

Complex tables are also possible. They can span columns and rows, and have multiple header lines, intermediate headers, and footers:

.l
h: Product     ; Properties ;   >   ; Mass
h:             ; Charge        ; Spin  ;
s: Leptons
Electron       ; −1            ; 1/2   ; 0.511 MeV
Neutrino       ; 0             ; 1/2   ; < 0.12 eV
s: Quarks
Up quark       ; +2/3          ; 1/2   ; 2.2 MeV
Down quark     ; −1/3          ; 1/2   ; 4.7 MeV
f: Total mass  ;   >   ;   >   ; ~ 7.5 MeV
..

This concludes our quick mathematical and physical tour of the Quarkup universe.

Please click .b target=web|.l https://quarkup.org|here.. .. .b !target=web|on the dynamic link on our homepage.. to download the latest release.
`;

    let compileTimer = null;
    let lastHtml = '';

    function setStatus(text, kind) {
        statusEl.textContent = text;
        statusEl.className = kind || '';
    }

    // Autosave to localStorage so a page reload doesn't discard the user's
    // work. Best-effort: private browsing / quota limits just skip it.
    const STORAGE_KEY = 'quarkup-playground-state-v1';

    function saveState() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                source: sourceEl.value,
                defines: definesEl.value,
                monolithic: monolithicEl.checked,
                useTemplate: useTemplateEl.checked,
                template: templateEl.value,
            }));
        } catch (err) {
            // ignore
        }
    }

    function loadState() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return false;
            const state = JSON.parse(raw);
            sourceEl.value = state.source ?? '';
            definesEl.value = state.defines ?? '';
            monolithicEl.checked = !!state.monolithic;
            useTemplateEl.checked = !!state.useTemplate;
            templateEl.value = state.template ?? '';
            templateEl.disabled = !useTemplateEl.checked;
            return true;
        } catch (err) {
            return false;
        }
    }

    // The wasm build can't run mathjax-svg-rs (it needs OS threads), so
    // .quarkup-math-tex placeholders carry the raw LaTeX in a data attribute
    // and get typeset here with KaTeX, a pure-JS renderer, once the preview
    // iframe has finished loading.
    function renderMath() {
        const doc = previewEl.contentDocument;
        if (!doc || typeof katex === 'undefined') return;

        if (!doc.querySelector('link[data-katex]')) {
            const link = doc.createElement('link');
            link.rel = 'stylesheet';
            link.href = 'vendor/katex/katex.min.css';
            link.dataset.katex = 'true';
            doc.head.appendChild(link);
        }

        doc.querySelectorAll('.quarkup-math-tex').forEach((el) => {
            const tex = el.getAttribute('data-latex') || '';
            const displayMode = el.getAttribute('data-display') === 'true';
            try {
                el.innerHTML = katex.renderToString(tex, { throwOnError: false, displayMode });
            } catch (err) {
                // leave the raw LaTeX source visible as a fallback
            }
        });
    }

    function runCompile() {
        try {
            const template = useTemplateEl.checked ? templateEl.value : undefined;
            const html = compile(sourceEl.value, template, monolithicEl.checked, definesEl.value);
            lastHtml = html;
            previewEl.srcdoc = html;
            downloadBtn.disabled = false;
            setStatus('Compiled successfully', 'ok');
        } catch (err) {
            setStatus('Error: ' + err, 'error');
        }
    }

    previewEl.addEventListener('load', renderMath);

    function scheduleCompile() {
        clearTimeout(compileTimer);
        compileTimer = setTimeout(() => {
            runCompile();
            saveState();
        }, 150);
    }

    [sourceEl, monolithicEl, definesEl, templateEl].forEach((el) => {
        el.addEventListener('input', scheduleCompile);
        el.addEventListener('change', scheduleCompile);
    });

    useTemplateEl.addEventListener('change', () => {
        templateEl.disabled = !useTemplateEl.checked;
        scheduleCompile();
    });

    optionsToggle.addEventListener('toggle', () => {
        optionsPanel.classList.toggle('open', optionsToggle.open);
    });

    loadExampleBtn.addEventListener('click', () => {
        sourceEl.value = EXAMPLE;
        definesEl.value = 'target=web';
        scheduleCompile();
    });

    downloadBtn.addEventListener('click', () => {
        const blob = new Blob([lastHtml], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'document.html';
        a.click();
        URL.revokeObjectURL(url);
    });

    init()
        .then(() => {
            setStatus('Compiler ready', 'ok');
            if (!loadState()) {
                sourceEl.value = EXAMPLE;
                definesEl.value = 'target=web';
            }
            runCompile();
        })
        .catch((err) => {
            setStatus('Failed to load WebAssembly module: ' + err, 'error');
        });
</script>
</body>
</html>
